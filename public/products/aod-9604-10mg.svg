<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 340" width="300" height="340">
  <defs>
    <linearGradient id="glass" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#eef1f6" stop-opacity="0.95"/>
      <stop offset="18%" stop-color="#ffffff" stop-opacity="0.75"/>
      <stop offset="50%" stop-color="#f3f6fa" stop-opacity="0.9"/>
      <stop offset="82%" stop-color="#dde3ec" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#cfd6e2" stop-opacity="0.95"/>
    </linearGradient>
    <linearGradient id="capMetal" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#c8cfdb"/>
      <stop offset="30%" stop-color="#f2f5f9"/>
      <stop offset="60%" stop-color="#aeb7c7"/>
      <stop offset="100%" stop-color="#98a2b4"/>
    </linearGradient>
    <linearGradient id="capFlame" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ff9a3d"/>
      <stop offset="100%" stop-color="#e05f00"/>
    </linearGradient>
    <linearGradient id="pill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#00FFF1"/>
      <stop offset="100%" stop-color="#009d94"/>
    </linearGradient>
    <linearGradient id="liquid" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ff9a3d" stop-opacity="0.26"/>
      <stop offset="100%" stop-color="#ff7a00" stop-opacity="0.42"/>
    </linearGradient>
    <linearGradient id="infinity" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#9aa4b5"/>
      <stop offset="50%" stop-color="#c8cfdb"/>
      <stop offset="100%" stop-color="#9aa4b5"/>
    </linearGradient>
    <filter id="soft" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
  </defs>

  <!-- shadow -->
  <ellipse cx="150" cy="318" rx="78" ry="12" fill="#131c2b" opacity="0.10" filter="url(#soft)"/>

  <!-- orange flip-off cap -->
  <rect x="106" y="20" width="88" height="28" rx="7" fill="url(#capFlame)"/>
  <rect x="112" y="24" width="24" height="6" rx="3" fill="#ffffff" opacity="0.35"/>
  <rect x="106" y="44" width="88" height="14" rx="3" fill="url(#capMetal)"/>

  <!-- neck -->
  <path d="M116 58 L116 76 Q116 84 108 88 L108 88 L192 88 Q184 84 184 76 L184 58 Z" fill="url(#capMetal)" opacity="0.9"/>

  <!-- body -->
  <rect x="92" y="88" width="116" height="222" rx="18" fill="url(#glass)" stroke="#c3cbd8" stroke-width="1.5"/>

  <!-- liquid -->
  <path d="M96 232 Q150 222 204 232 L204 292 Q204 306 190 306 L110 306 Q96 306 96 292 Z" fill="url(#liquid)"/>

  <!-- glass highlight -->
  <rect x="102" y="98" width="10" height="200" rx="5" fill="#ffffff" opacity="0.65"/>

  <!-- label -->
  <rect x="96" y="106" width="108" height="118" rx="8" fill="#ffffff" stroke="#e5e9f0" stroke-width="1.2"/>

  <!-- infinity mark -->
  <path d="M138 120 c-5 -6 -13 -6 -13 1 c0 7 8 7 13 1 c5 -6 13 -6 13 1 c0 7 -8 7 -13 -1"
        transform="translate(12 0)"
        fill="none" stroke="url(#infinity)" stroke-width="2.4" stroke-linecap="round"/>

  <!-- wordmark -->
  <text x="150" y="143" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="14" font-weight="700">
    <tspan fill="#00a5a5">pure</tspan><tspan fill="#ff7a00"> energy</tspan>
  </text>
  <text x="150" y="156" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="9" letter-spacing="3.2" fill="#8d95a6">peptides</text>

  <!-- product pill -->
  <rect x="106" y="163" width="88" height="21" rx="6" fill="url(#pill)"/>
  <text x="150" y="177.5" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="13" font-weight="700" fill="#ffffff" textLength="68.64" lengthAdjust="spacingAndGlyphs">AOD-9604</text>

  <!-- strength + purity -->
  <text x="150" y="199" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="13" font-weight="600" fill="#3d4657">10mg</text>
  <text x="150" y="211" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="7.5" fill="#8d95a6">99% Purity</text>
  <text x="150" y="220" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="7.5" letter-spacing="0.4" fill="#8d95a6">RESEARCH USE ONLY</text>
</svg>
